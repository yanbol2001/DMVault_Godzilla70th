function routeSet(name){const ns=new Set([name]),es=new Set();paths.filter(path=>path.includes(name)).forEach(path=>{path.forEach(n=>ns.add(n));for(let i=0;i<path.length-1;i++)es.add(path[i]+'→'+path[i+1])});return{ns,es}}
function highlightRoutes(name){const c=routeSet(name);document.querySelectorAll('.node').forEach(n=>{n.classList.toggle('hovered',n.dataset.name===name);n.classList.toggle('dim',!c.ns.has(n.dataset.name))});document.querySelectorAll('.edge').forEach(e=>{const k=e.dataset.a+'→'+e.dataset.b;e.classList.toggle('hot',c.es.has(k));e.classList.toggle('dim',!c.es.has(k))})}
function clearHighlight(){document.querySelectorAll('.node').forEach(n=>n.classList.remove('hovered','dim'));document.querySelectorAll('.edge').forEach(e=>e.classList.remove('hot','dim'))}
let scale=.65,tx=0,ty=0;const viewport=document.getElementById('viewport'),world=document.getElementById('world');function apply(){world.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;zoomValue.textContent=Math.round(scale*100)+'%'}function resetView(){scale=Math.min(.75,(viewport.clientWidth-20)/1920,(viewport.clientHeight-20)/1120);tx=(viewport.clientWidth-1920*scale)/2;ty=Math.max(8,(viewport.clientHeight-1120*scale)/2);apply()}minus.onclick=()=>{scale=Math.max(.35,scale-.1);apply()};plus.onclick=()=>{scale=Math.min(1.5,scale+.1);apply()};reset.onclick=resetView;wireOff.onclick=()=>{svg.style.display='none';wireOff.classList.add('active');wireOn.classList.remove('active')};wireOn.onclick=()=>{svg.style.display='block';wireOn.classList.add('active');wireOff.classList.remove('active')};
let drag=false,lx=0,ly=0;viewport.addEventListener('pointerdown',e=>{if(e.target.closest('.node'))return;drag=true;lx=e.clientX;ly=e.clientY;viewport.setPointerCapture(e.pointerId);viewport.classList.add('dragging')});viewport.addEventListener('pointermove',e=>{if(!drag)return;tx+=e.clientX-lx;ty+=e.clientY-ly;lx=e.clientX;ly=e.clientY;apply()});viewport.addEventListener('pointerup',()=>{drag=false;viewport.classList.remove('dragging')});viewport.addEventListener('wheel',e=>{e.preventDefault();const old=scale;scale=Math.max(.35,Math.min(1.5,scale*(e.deltaY<0?1.1:.9)));const r=viewport.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;tx=mx-(mx-tx)*(scale/old);ty=my-(my-ty)*(scale/old);apply()},{passive:false});window.addEventListener('resize',resetView);resetView();
</script></body></html>

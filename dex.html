function rootColor(name,seen=new Set()){if(parentColor.has(name))return parentColor.get(name);if(seen.has(name))return '#8b5cf6';seen.add(name);const incoming=edges.filter(e=>e[1]===name);let c;if(!incoming.length)c=palette[monsters.findIndex(m=>m.name===name)%palette.length];else c=rootColor(incoming[0][0],seen);parentColor.set(name,c);return c;}
function render(){const heads=document.getElementById('stageHeads'),cols=document.getElementById('columns');heads.innerHTML='';cols.innerHTML='';stages.forEach(st=>{const list=monsters.filter(m=>m.stage===st);const h=document.createElement('div');h.className='stage-head';h.innerHTML=`${st}<small>${list.length} 隻</small>`;heads.appendChild(h);const col=document.createElement('div');col.className='col';col.dataset.stage=st;list.forEach(m=>{const n=document.createElement('button');n.className='dex-node';n.dataset.name=m.name;n.dataset.search=(m.name+' '+m.jp+' '+m.id).toLowerCase();n.style.setProperty('--node-color',rootColor(m.name));n.innerHTML=`<img src="${m.img}" alt="${m.name}"><strong>${m.name}</strong>`;n.onclick=()=>showDetail(m);col.appendChild(n);});cols.appendChild(col);});requestAnimationFrame(drawLines);}
function drawLines(){const svg=document.getElementById('treeLines'),canvas=document.getElementById('treeCanvas');svg.innerHTML='';const cr=canvas.getBoundingClientRect();svg.setAttribute('width',canvas.scrollWidth);svg.setAttribute('height',canvas.scrollHeight);svg.setAttribute('viewBox',`0 0 ${canvas.scrollWidth} ${canvas.scrollHeight}`);edges.forEach(([a,b],i)=>{const A=document.querySelector(`.dex-node[data-name="${CSS.escape(a)}"]`),B=document.querySelector(`.dex-node[data-name="${CSS.escape(b)}"]`);if(!A||!B||A.classList.contains('filtered')||B.classList.contains('filtered'))return;const ar=A.getBoundingClientRect(),br=B.getBoundingClientRect();const x1=ar.right-cr.left,y1=ar.top-cr.top+ar.height/2,x2=br.left-cr.left,y2=br.top-cr.top+br.height/2;const mid=(x1+x2)/2;const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M ${x1} ${y1} H ${mid} V ${y2} H ${x2}`);p.setAttribute('stroke',rootColor(a));svg.appendChild(p);});}

document.getElementById('detailClose').onclick=()=>document.getElementById('detailPanel').classList.remove('open');document.querySelectorAll('.mode-switch button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode-switch button').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('treeCanvas').classList.toggle('dex-only',b.dataset.mode==='dex');requestAnimationFrame(drawLines);});document.getElementById('dexSearch').addEventListener('input',e=>{const q=e.target.value.trim().toLowerCase();document.querySelectorAll('.dex-node').forEach(n=>n.classList.toggle('filtered',q&&!n.dataset.search.includes(q)));requestAnimationFrame(drawLines);});window.addEventListener('resize',()=>requestAnimationFrame(drawLines));render();
